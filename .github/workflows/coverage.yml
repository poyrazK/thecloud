name: Coverage Gate

on:
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    name: Enforce Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloud
          POSTGRES_PASSWORD: cloud
          POSTGRES_DB: cloud
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U cloud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Wait for Database
        run: |
          timeout 60s bash -c 'until pg_isready -h 127.0.0.1 -p 5433 -U cloud; do
            echo "Waiting for postgres..."
            sleep 2
          done'

      - name: Run Tests
        env:
          DATABASE_URL: postgres://cloud:cloud@127.0.0.1:5433/cloud?sslmode=disable
        run: go test -v -coverprofile=coverage.out ./cmd/... ./internal/... ./pkg/...

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Current total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 55" | bc -l) )); then
            echo "Error: Code coverage $COVERAGE% is below the required 55% threshold."
            exit 1
          fi
          echo "Coverage check passed!"
