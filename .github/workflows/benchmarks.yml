name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          
      - name: Run Benchmarks
        run: |
          go test -run '^$' -bench=. -benchmem ./internal/core/services/... 2>/dev/null \
            | grep -E '^(goos:|goarch:|pkg:|cpu:|Benchmark|PASS$|ok\s)' \
            | tee bench.txt

      - name: Store Benchmark Result (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmarks
          tool: 'go'
          output-file-path: bench.txt
          # On PRs, publishing to gh-pages is not allowed in all permission models.
          auto-push: false
          # Fail if performance drops by more than 50%
          alert-threshold: '200%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Store Benchmark Result (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmarks
          tool: 'go'
          output-file-path: bench.txt
          # Access token to push results to gh-pages branch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Fork PRs cannot push to upstream gh-pages with GITHUB_TOKEN.
          auto-push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          # Fail if performance drops by more than 50%
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
