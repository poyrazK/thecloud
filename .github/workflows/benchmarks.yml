name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          
      - name: Run Benchmarks
        run: |
          go test -run '^$' -bench=. -benchmem ./internal/core/services/... 2>/dev/null \
            | grep -E '^(goos:|goarch:|pkg:|cpu:|Benchmark|PASS$|ok\s)' \
            | tee bench.txt

      - name: Check Benchmark Output
        run: |
          if [ ! -s bench.txt ]; then
            echo "ERROR: bench.txt is empty. Benchmark command produced no output."
            echo "This likely means 'go test' failed or produced no benchmark data."
            echo "Running without 2>/dev/null to expose actual error:"
            go test -run '^$' -bench=. -benchmem ./internal/core/services/... 2>&1 || true
            exit 1
          fi
          echo "Benchmark output OK ($(wc -l < bench.txt) lines)"

      - name: Store Benchmark Result (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmarks
          tool: 'go'
          output-file-path: bench.txt
          # On PRs, publishing to gh-pages is not allowed in all permission models.
          auto-push: false
          # Fail if performance drops by more than 50%
          alert-threshold: '200%'
          comment-on-alert: false
          fail-on-alert: false

      - name: Store Benchmark Result (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmarks
          tool: 'go'
          output-file-path: bench.txt
          # Access token to push results to gh-pages branch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Fail if performance drops by more than 50%
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
